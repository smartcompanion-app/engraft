name: Release Pipeline

on:
  release:
    types: [published]

jobs:
  py-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: ruff format --check .

  py-test:
    needs: py-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - run: pip install -e .[dev]
      - run: pytest

  py-build:
    needs: py-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: py-dist
          path: python/dist/

  ts-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - run: npm run lint

  ts-test:
    needs: ts-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  ts-build:
    needs: ts-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"
      - run: npm run build
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: ts-dist
          path: |
            typescript/*.tgz
            typescript/package.json

  e2e:
    needs: [py-build, ts-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          name: py-dist
          path: py-dist/
      - uses: actions/download-artifact@v4
        with:
          name: ts-dist
          path: ts-dist/
      - name: Install Python wheel
        run: pip install py-dist/*.whl
      - name: Install TypeScript runtime deps
        working-directory: typescript
        run: npm ci --omit=dev
      - name: Stage TypeScript bundle for e2e harness
        run: |
          mkdir -p typescript/dist
          tar -xzf ts-dist/*.tgz -C /tmp
          cp /tmp/package/dist/cli.js typescript/dist/cli.js
      - name: Install e2e test dependencies
        run: pip install pytest
      - run: pytest e2e/

  py-publish:
    needs: e2e
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: py-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  ts-publish:
    needs: e2e
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          name: ts-dist
          path: ts-dist/
      - name: Publish to npm
        run: npm publish ./ts-dist/*.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
