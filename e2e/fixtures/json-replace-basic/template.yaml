variables:
  project_name:
    description: Project name
    default: my-app
  project_version:
    description: Initial version
    default: 0.1.0
  lodash_version:
    description: lodash dependency version range
  first_keyword:
    description: First keyword entry

customizations:
  - action: json_replace
    file: package.json
    replace:
      - selector: $.name
        variable: project_name
      - selector: $.version
        variable: project_version
      - selector: $.dependencies.lodash
        variable: lodash_version
      - selector: $.keywords[0]
        variable: first_keyword
